apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload
  namespace: openshift-gitops
spec:
  generators:
    - list:
        elements:
          - name: workload-dev
            namespace: workload-dev
            path: apps/workload/overlays/dev
  template:
    metadata:
      name: '{{name}}'
      namespace: openshift-gitops
    spec:
      project: default
      source:
        repoURL: https://github.com/yKanaGit/openshift-app-bootstrap-handson.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-prod
  namespace: openshift-gitops
spec:
  generators:
    - list:
        elements:
          - name: workload-prod
            namespace: workload-prod
            path: apps/workload/overlays/prod
  template:
    metadata:
      name: '{{name}}'
      namespace: openshift-gitops
    spec:
      project: default
      source:
        repoURL: https://github.com/yKanaGit/openshift-app-bootstrap-handson.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
