apiVersion: v1
kind: Secret
metadata:
  name: github-ykanagit-repo-creds
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/secret-type: repo-creds
type: Opaque
stringData:
  type: git
  url: https://github.com/yKanaGit
  username: YOUR_GITHUB_USERNAME
  password: YOUR_GITHUB_ACCESS_TOKEN
